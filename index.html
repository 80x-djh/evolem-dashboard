<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>EVOLEM Dashboard</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #eee;
            }

            html.staticrypt-html, .staticrypt-body { background: #1947D4 !important; color: #ffffff; }

            .brand-mark {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
                margin-bottom: 28px;
            }
            .brand-mark img { width: 64px; height: 64px; border-radius: 14px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35); background: #ffffff; padding: 6px; }
            .brand-mark .brand-text { color: rgba(255,255,255,0.75); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
            .brand-mark .brand-text strong { color: #ffffff; }

            .staticrypt-page {
                width: 380px;
                padding: 6% 0 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: rgba(255,255,255,0.08);
                border: 1px solid rgba(255,255,255,0.15);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-radius: 14px;
                max-width: 380px;
                margin: 0 auto 60px;
                padding: 36px 36px 32px;
                text-align: center;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box;
                font-size: 14px;
                outline: 0;
                padding: 15px 30px 15px 15px;
                width: 100%;
                color: #ffffff;
            }
            .staticrypt-form input[type="password"]::placeholder { color: rgba(255,255,255,0.55); }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: rgba(0,0,0,0.18);
                border: 1px solid rgba(255,255,255,0.18);
                border-radius: 8px;
                width: 100%;
                margin: 0 0 15px;
                box-sizing: border-box;
            }

            .staticrypt-hr { border-top-color: rgba(255,255,255,0.15) !important; }
            .staticrypt-title { color: #ffffff; font-weight: 600; }
            .staticrypt-instructions p:not(.staticrypt-title) { color: rgba(255,255,255,0.78); font-size: 13px; line-height: 1.5; }
            .staticrypt-form .staticrypt-decrypt-button { border-radius: 8px; font-weight: 600; letter-spacing: 0.05em; background: #ffffff !important; color: #1947D4 !important; }
            .staticrypt-form .staticrypt-decrypt-button:hover { filter: brightness(0.96); }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 60%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: #4CAF50;
                width: 100%;
                border: 0;
                padding: 15px;
                color: #ffffff;
                font-size: 14px;
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #4CAF50;
                filter: brightness(92%);
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 1em;
                background: #76B852;
                font-family: "Arial", sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-instructions {
                margin-top: -1em;
                margin-bottom: 1em;
            }

            .staticrypt-title {
                font-size: 1.5em;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.5);
                margin-right: 1em;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid gray;
                border-right-color: transparent;
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
                animation-duration: 0.75s;
                animation-timing-function: linear;
                animation-delay: 0s;
                animation-iteration-count: infinite;
                animation-direction: normal;
                animation-fill-mode: none;
                animation-play-state: running;
                animation-name: spinner-border;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>
